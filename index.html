<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>益智游戏集 - Oscar Studio</title>
    <link rel="stylesheet" href="user-auth.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="super-ui.css">
    <script defer src="https://cloud.umami.is/script.js"
        data-website-id="cbc5311f-d106-4566-853d-1376d4f4774b"></script>
    <script>LA.init({ id: "3ObNUtNXa4Os8xRM", ck: "3ObNUtNXa4Os8xRM" })</script>
</head>

<body>
    <!-- Top Bar -->
    <header class="top-bar">
        <div class="breadcrumb">Oscar Studio > <span>益智游戏</span></div>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="搜索">
        </div>
        <button class="settings-btn" id="settingsBtn">⚙</button>
        <div class="settings-dropdown" id="settingsDropdown">
            <h4>画质设置</h4>
            <label class="settings-option">
                <input type="radio" name="quality" value="low">
                <span class="radio"></span>
                <span>低（去除动画）</span>
            </label>
            <label class="settings-option">
                <input type="radio" name="quality" value="normal">
                <span class="radio"></span>
                <span>正常</span>
            </label>
            <label class="settings-option">
                <input type="radio" name="quality" value="plasma">
                <span class="radio"></span>
                <span>等离子OS</span>
            </label>
        </div>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-icon">🎮</div>
        <h1>益智游戏集</h1>
        <p>丰富的益智游戏集合，包含棋类、数字游戏、记忆挑战等多种类型。锻炼思维，放松身心。</p>
    </section>

    <!-- Card Container -->
    <main class="card-container" id="cardContainer"></main>

    <!-- Backdrop -->
    <div class="backdrop" id="backdrop"></div>

    <script src="script.js"></script>
</body>
</html>
